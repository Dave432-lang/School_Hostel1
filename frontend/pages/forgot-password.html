<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — School Hostel</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-brand">
      <div class="logo-box">🔒</div>
      <h1>Forgot Password</h1>
      <p>Enter your email to receive a secure reset link</p>
    </div>

    <div class="card login-card" style="position:relative;">
      <div id="reset-alert" class="alert"></div>
      
      <form id="forgot-form">
        <div class="form-group input-icon-wrap">
          <span class="icon">✉️</span>
          <input type="email" id="email" class="form-control" placeholder="Student Email Address" required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-full" id="submit-btn" style="margin-top:10px;">Send Reset Link</button>
      </form>

      <div class="divider"><span>OR</span></div>
      
      <div class="register-link">
        Remembered your password? <a href="../index.html">Back to Login</a>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/theme.js"></script>
  <script>
    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const alertBox = document.getElementById('reset-alert');
      const btn = document.getElementById('submit-btn');
      
      if (!email) return;

      btn.disabled = true;
      btn.textContent = 'Sending...';
      
      try {
        const res = await apiFetch('/forgot-password', {
          method: 'POST',
          body: JSON.stringify({ email })
        });
        
        alertBox.className = 'alert alert-success show';
        alertBox.textContent = res.message || 'Link sent! Please check your inbox.';
        document.getElementById('email').value = '';
      } catch (err) {
        alertBox.className = 'alert alert-error show';
        alertBox.textContent = err.message || 'Failed to send reset link.';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
