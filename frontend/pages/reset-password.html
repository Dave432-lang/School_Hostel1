<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password — School Hostel</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-brand">
      <div class="logo-box">🔑</div>
      <h1>Set New Password</h1>
      <p>Please enter a strong new password</p>
    </div>

    <div class="card login-card" style="position:relative;">
      <div id="reset-alert" class="alert"></div>
      
      <form id="reset-form">
        <div class="form-group input-icon-wrap">
          <span class="icon">🔒</span>
          <input type="password" id="password" class="form-control" placeholder="New Password" required minlength="6">
        </div>
        <div class="form-group input-icon-wrap">
          <span class="icon">🔒</span>
          <input type="password" id="confirm-password" class="form-control" placeholder="Confirm Password" required minlength="6">
        </div>
        
        <button type="submit" class="btn btn-primary btn-full" id="submit-btn" style="margin-top:10px;">Update Password</button>
      </form>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/theme.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      
      if (!token) {
        const alertBox = document.getElementById('reset-alert');
        alertBox.className = 'alert alert-error show';
        alertBox.textContent = 'Invalid or missing reset token. Please request a new one.';
        document.getElementById('submit-btn').disabled = true;
      }

      document.getElementById('reset-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const p1 = document.getElementById('password').value;
        const p2 = document.getElementById('confirm-password').value;
        const alertBox = document.getElementById('reset-alert');
        const btn = document.getElementById('submit-btn');

        if (p1 !== p2) {
          alertBox.className = 'alert alert-error show';
          alertBox.textContent = 'Passwords do not match.';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Updating...';

        try {
          const res = await apiFetch('/reset-password', {
            method: 'POST',
            body: JSON.stringify({ token, newPassword: p1 })
          });
          
          alertBox.className = 'alert alert-success show';
          alertBox.textContent = 'Password reset successfully! Redirecting to login...';
          document.getElementById('reset-form').reset();
          
          setTimeout(() => {
            window.location.href = '../index.html';
          }, 2000);
          
        } catch (err) {
          alertBox.className = 'alert alert-error show';
          alertBox.textContent = err.message || 'Failed to reset password. The token may be expired.';
          btn.disabled = false;
          btn.textContent = 'Update Password';
        }
      });
    });
  </script>
</body>
</html>
